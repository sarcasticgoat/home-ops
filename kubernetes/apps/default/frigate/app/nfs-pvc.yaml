---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: frigate-nfs
spec:
  storageClassName: frigate-nfs
  capacity:
    storage: 1Mi
  accessModes: ["ReadWriteMany"]
  persistentVolumeReclaimPolicy: Retain
  nfs:
    server: nas.fakedomain.local # substitution breaks this so I set up a DNS override on DNS resolver
    path: /mnt/user/NFS
  # Note: The first two options are strictly for NFSv4.2
  mountOptions: ["nfsvers=4.2", "nconnect=8", "hard", "noatime"]
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: frigate-nfs
  namespace: default
spec:
  accessModes: ["ReadWriteMany"]
  storageClassName: frigate-nfs
  resources:
    requests:
      storage: 1Mi
